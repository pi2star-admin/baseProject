version: '3.9'

services:
  # 应用服务（前端 + 后端）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: base-project-app
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      # Prisma 使用 DATABASE_URL 连接数据库
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/base_project
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - base-network

  # PostgreSQL 数据库服务
  postgres:
    image: postgres:17-alpine
    container_name: base-project-postgres
    environment:
      POSTGRES_DB: base_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 初始化 SQL 脚本（可在此目录放置建表语句）
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'   # 开发时可访问，生产环境可移除此映射
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - base-network

networks:
  base-network:
    driver: bridge

volumes:
  postgres_data:
